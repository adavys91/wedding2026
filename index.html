<!DOCTYPE html>
<html lang="hu">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Wedding on Agárd 2026</title>
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    header {
        padding: 20px;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
    }

    .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 12px;
        padding: 20px;
    }

    button {
        width: 90%;
        max-width: 320px;
        padding: 14px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        background: #222;
        color: white;
    }

    button:hover {
        background: #444;
    }

    .page {
        display: none;
        flex: 1;
        padding: 10px;
        text-align: center;
    }

    .active {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    img {
        width: 100%;
        max-width: 900px;
        height: auto;
        margin-top: 15px;
        border-radius: 10px;
    }

    .back {
        margin-top: 20px;
        background: #888;
    }
</style>
</head>
<body>

<header>
    Wedding on Agárd 2026<br>
    Anita x Dávid
</header>

<div id="home" class="container page active">
    <button onclick="navigate('map')">Térkép</button>
    <button onclick="navigate('schedule')">Menetrend</button>
    <button onclick="navigate('drinks')">Itallap</button>
    <button onclick="navigate('rooms')">Szobabeosztás</button>
</div>

<!-- TÉRKÉP -->
<div id="map" class="page">
    <h2>Térkép</h2>
    <img src="terkep.png" alt="Térkép">
    <button class="back" onclick="navigate('home')">Vissza</button>
</div>

<!-- MENETREND -->
<div id="schedule" class="page">
    <h2>Menetrend</h2>
    <p>
        15:00 - Érkezés<br>
        16:00 - Szertartás<br>
        17:00 - Gratulációk, fotózás<br>
        18:30 - Vacsora<br>
        20:00 - Játékok<br>
        21:00 - Torta<br>
        22:00 - Buli hajnalig 🎉
    </p>
    <button class="back" onclick="navigate('home')">Vissza</button>
</div>

<!-- ITALLAP -->
<div id="drinks" class="page">
    <h2>Itallap</h2>
    <img src="itallap.png" alt="Itallap">
    <button class="back" onclick="navigate('home')">Vissza</button>
</div>

<!-- SZOBABEosztás -->
<div id="rooms" class="page">
    <h2>Szobabeosztás</h2>
    <img src="szobak.png" alt="Szobabeosztás">
    <button class="back" onclick="navigate('home')">Vissza</button>
</div>

<script>
    function navigate(pageId) {
        const pages = document.querySelectorAll('.page');
        pages.forEach(p => p.classList.remove('active'));

        document.getElementById(pageId).classList.add('active');
    }
</script>

</body>
</html>

<script>
function toggle(id) {
    const el = document.getElementById(id);

    if (el.style.display === "flex" || el.style.display === "block") {
        el.style.display = "none";
    } else {
        el.style.display = "flex";
        el.style.flexDirection = "column";
        el.alignItems = "center";
    }
}
</script>
